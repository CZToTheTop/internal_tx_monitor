# ============================================================
# 测试配置：监控 BNB 上 Safe 对 Timelock 的 schedule / execute 调用
# Safe: https://app.safe.global/transactions/history?safe=bnb:0x8d388136d578dcd791d081c6042284ced6d9b0c6
# ============================================================
# 使用前：将下方 toAddresses 中的 0x_TIMELOCK_CONTRACT_ADDRESS 改为实际 Timelock 合约地址。
# 若暂不知道 Timelock 地址，可把 toAddresses 设为 []，即监控 Safe 对任意合约的 schedule/execute 调用。
# ============================================================

network: bsc_mainnet
webhookUrl: https://your-server.com/webhook

# 单 Webhook：整份配置只建 1 个 Webhook，按 target 多维度筛查
singleWebhook: true

# 单 Webhook 时 signing_key 写在 targets 下（与 list 平级），npm run setup 后把返回的 key 填到下面
targets:
  signing_key: ""
  list:
    - type: internal_calls
      label: "Safe 0x8d388136d578dcd791d081c6042284ced6d9b0c6→ Timelock schedule/execute"
      # 调用方：Safe 多签地址（仅当 Safe 发起对 timelock 的调用时报警）
      fromAddresses:
        - "0x8d388136d578dcd791d081c6042284ced6d9b0c6"
      # 被调用的合约：Timelock 地址（请替换为实际地址）
      toAddresses:
        - "0x2e2807F88C381Cb0CC55c808a751fC1E3fcCbb85"
      # OpenZeppelin TimelockController: schedule / execute 的 4 字节 selector
      methodSelectors:
        - "0x56055f7d"   # schedule(address,uint256,bytes,bytes32,bytes32,uint256)
        - "0x134008d3"   # execute(address,uint256,bytes,bytes32,bytes32)
    - type: internal_calls
      label: "0x85ce862c5bb61938ffcc97da4a80c8aae43c6a27 Deposit Rewards"
      fromAddresses:
        - "0x85ce862c5bb61938ffcc97da4a80c8aae43c6a27"
      toAddresses:
        - "0x307d13267f360f78005f476Fa913F8848F30292A"
      methodSelectors:
        - "0x50cc6cd6"   # schedule(address,uint256,bytes,bytes32,bytes32,uint256)
