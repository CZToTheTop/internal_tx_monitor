# ============================================================
# Alchemy 链上监控 - 配置示例
# 复制为 config.yaml 后修改
# ============================================================

# ---------- 全局配置 ----------
# 监听的链（eth_mainnet / BNB_MAINNET / polygon_mainnet 等）
network: eth_mainnet

# 公网可访问的 Webhook 地址（Alchemy 会向此 URL 推送数据）
webhookUrl: https://your-server.com/webhook

# 单 Webhook 模式（推荐）：
#   true = 整份配置只创建 1 个 Webhook，signing_key 写在 targets 下（targets.signing_key），target 列表写在 targets.list
#   不写或 false = 每个 target 对应 1 个 Webhook，每个 target 内可写 signing_key
# singleWebhook: true

# ---------- 监控目标（可多个）-----------
# 多 Webhook 模式：targets 为数组，每项可写 signing_key
# 单 Webhook 模式：targets 为对象，含 signing_key 与 list，例如：
#   targets:
#     signing_key: ""    # npm run setup 后填此处
#     list:
#       - type: events
#         ...
targets:

  # --- 类型 1：合约事件 (logs) ---
  - type: events
    label: "USDC 转账"
    signing_key: ""                     # 多 Webhook 时：setup 后填该 target 的 key
    addresses:
      - "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
    topics:
      - "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"  # Transfer(address,address,uint256)
    # network: ETH_MAINNET

  # --- 类型 2：外部交易 (transactions) ---
  - type: transactions
    label: "Vault 被调用"
    signing_key: ""
    addresses: []
    txFrom: []
    txTo:
      - "0x388C818CA8B9251b393131C08a736A67ccB19297"
    # network: ETH_MAINNET

  # --- 类型 3：内部调用 (internal_calls) ---
  - type: internal_calls
    label: "USDT transfer 被调用"
    signing_key: ""
    addresses:
      - "0x55d398326f99059fF775485246999027B3197955"
    fromAddresses: []
    toAddresses:
      - "0x55d398326f99059fF775485246999027B3197955"
    methodSelectors:
      - "0xa9059cbb"                    # transfer(address,uint256)
    # network: BNB_MAINNET
