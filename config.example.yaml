# ============================================================
# 示例：BNB 上 Safe 对 Timelock 的 schedule / execute 监控
# Safe: https://app.safe.global/transactions/history?safe=bnb:0x8d388136d578dcd791d081c6042284ced6d9b0c6
# ============================================================
# 用法：复制为 config.yaml 或 CONFIG_PATH=config.safe-timelock-test.yaml npm run setup
# 将 toAddresses 中的 Timelock 地址改为实际合约；toAddresses 留空 [] 则监控 Safe 对任意合约的 schedule/execute
# ============================================================

network: bsc_mainnet
webhookUrl: https://your-server.com/webhook

# 单 Webhook：一个 key，多条规则，服务端按规则匹配并分别用 label 报警
singleWebhook: true

targets:
  - signing_key: ""   # npm run setup 后把返回的 Signing Key 填此处
    list:
      # 规则 1：Safe 多签对 Timelock 的 schedule/execute
      - type: internal_calls
        label: "Safe → Timelock schedule/execute"
        fromAddresses:
          - "0x8d388136d578dcd791d081c6042284ced6d9b0c6"
        toAddresses:
          - "0x2e2807F88C381Cb0CC55c808a751fC1E3fcCbb85"   # 改为你的 Timelock 地址
        methodSelectors:
          - "0x56055f7d"   # schedule(address,uint256,bytes,bytes32,bytes32,uint256)
          - "0x134008d3"   # execute(address,uint256,bytes,bytes32,bytes32)

      # 规则 2：另一地址对某合约的 schedule 调用
      - type: internal_calls
        label: "Deposit Rewards schedule"
        fromAddresses:
          - "0x85ce862c5bb61938ffcc97da4a80c8aae43c6a27"
        toAddresses:
          - "0x307d13267f360f78005f476Fa913F8848F30292A"
        methodSelectors:
          - "0x50cc6cd6"

  - signing_key: "whsec_OWPUGzW7EN4hozdBo73MFsGc"
    list:
      - type: internal_calls
        label: "Role modification"
        fromAddresses:
          - "0x7625B1c374b0D1546d87c0ab66229461007f1e33"
        toAddresses:
          - []
        methodSelectors:
          - "0xd547741f"
          - "0xd547741f"
          - "0x2f2ff15d"
          - "0x1785f53c"
