# Alchemy 链上监控配置
# 复制为 config.yaml 并修改

# 网络: eth_mainnet, eth_sepolia, polygon_mainnet, arbitrum_mainnet, optimism_mainnet, base_mainnet 等
network: eth_mainnet

# Webhook 接收地址，需公网可访问 (本地开发可用 ngrok: ngrok http 8080)
webhookUrl: https://your-ngrok-url.ngrok.io/webhook

targets:
  # 1. 监控合约事件 (logs)
  - type: events
    label: "USDC Transfer"
    addresses:
      - "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
    topics:
      - "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"  # Transfer(address,address,uint256)

  # 2. 监控外部交易 (用户直接调用的交易)
  - type: transactions
    label: "Calls to Vault"
    addresses:
      - "0x388C818CA8B9251b393131C08a736A67ccB19297"
    txTo:
      - "0x388C818CA8B9251b393131C08a736A67ccB19297"

  # 3. 监控内部调用 (含合约 A 调用合约 B，支持 call/delegatecall)
  - type: internal_calls
    label: "Internal calls to Router"
    addresses:
      - "0x5c43B1eD97e52d009611D89b74fA829FE4ac56b1"
    toAddresses:
      - "0x5c43B1eD97e52d009611D89b74fA829FE4ac56b1"
    # fromAddresses: []  # 空表示任意 from
    # methodSelectors: ["0xa9059cbb"]  # 仅监控 transfer(address,uint256)，可选
