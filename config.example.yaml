# ============================================================
# Alchemy 链上监控 - 配置示例
# 复制为 config.yaml 后修改
# ============================================================

# ---------- 全局配置 ----------
# 监听的链（eth_mainnet / BNB_MAINNET / polygon_mainnet 等）
network: eth_mainnet

# 公网可访问的 Webhook 地址（Alchemy 会向此 URL 推送数据）
webhookUrl: https://your-server.com/webhook

# 单 Webhook 模式：
#   true = 只创建 1 个 Webhook，signing_key 写在 targets 下，target 列表写在 targets.list
# 多组模式：targets 为「数组的数组」每项为 { signing_key, list }，每个 key 对应一组规则，收到 event 先按 key 分流再组内匹配
# singleWebhook: true

# ---------- 监控目标 ------------
# 三种写法任选一：
# 1) 多 Webhook：targets 为数组，每项一个 target，可写 signing_key
# 2) 单 Webhook：targets 为对象 { signing_key, list: [ ... ] }
# 3) 多组：targets 为 [ { signing_key, list: [ ... ] }, { signing_key, list: [ ... ] } ]，每个 key 对应多条规则
targets:

  # --- 类型 1：合约事件 (logs) ---
  - type: events
    label: "USDC 转账"
    signing_key: ""                     # 多 Webhook 时：setup 后填该 target 的 key
    addresses:
      - "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
    topics:
      - "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"  # Transfer(address,address,uint256)
    # network: ETH_MAINNET

  # --- 类型 2：外部交易 (transactions) ---
  - type: transactions
    label: "Vault 被调用"
    signing_key: ""
    addresses: []
    txFrom: []
    txTo:
      - "0x388C818CA8B9251b393131C08a736A67ccB19297"
    # network: ETH_MAINNET

  # --- 类型 3：内部调用 (internal_calls) ---
  - type: internal_calls
    label: "USDT transfer 被调用"
    signing_key: ""
    addresses:
      - "0x55d398326f99059fF775485246999027B3197955"
    fromAddresses: []
    toAddresses:
      - "0x55d398326f99059fF775485246999027B3197955"
    methodSelectors:
      - "0xa9059cbb"                    # transfer(address,uint256)
    # 可选：用于 decode input 参数；不配则尝试从 Explorer API 拉取 to 合约 ABI
    # abiPath: abis/usdt.json          # 相对项目根的 ABI 文件路径
    # abi: [ { type: "function", name: "transfer", inputs: [...] } ]  # 或内联 ABI
    # network: BNB_MAINNET

    # 可选：细粒度规则示例（命中该 target 后再按规则检查）
